kind = "web"
previewPath = "/"
title = "Freelance Earnings & Tax Calculator"
version = "1.0.0"
id = "artifacts/freelance-tax-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20100

[services.development]
run = "pnpm --filter @workspace/freelance-tax-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/freelance-tax-calculator", "run", "build" ]
publicDir = "artifacts/freelance-tax-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20100"
BASE_PATH = "/"
